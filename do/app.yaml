name: maskai
region: nyc

databases:
  - cluster_name: maskai-db
    database_name: maskai
    database_user: maskai
    engine: PG
    version: "16"

workers:
  - build_command: uv sync
    environment_slug: python
    github:
      branch: main
      deploy_on_push: true
      repo: your-username/maskai
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    name: web
    run_command: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
