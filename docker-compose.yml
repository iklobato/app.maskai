services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache/huggingface
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: maskai
      POSTGRES_USER: maskai
      POSTGRES_PASSWORD: maskai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maskai -d maskai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  model_cache:
